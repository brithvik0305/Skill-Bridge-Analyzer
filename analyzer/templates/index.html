<!DOCTYPE html>
<html>
<head>
    <title>Skill Bridge</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
        }
        .card {
            border-radius: 15px;
        }
        .title {
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg p-4" style="width: 500px;">
        
        <h3 class="text-center mb-3 title">🚀 Skill Bridge</h3>
        <p class="text-center text-muted">Analyze your resume and get a personalized roadmap</p>

        <form action="/analyze/" method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- Resume Upload -->
            <div class="mb-3">
                <label class="form-label">Upload Resume (PDF)</label>
                <input type="file" class="form-control" name="resume" required>
            </div>

            <!-- JD Input -->
            <div class="mb-3">
                <label class="form-label">Job Description</label>
                <textarea 
                    class="form-control" 
                    name="job_description" 
                    rows="5" 
                    placeholder="Paste job description here..." 
                    required>
                </textarea>
            </div>

            <!-- Button -->
            <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                    Analyze 🚀
                </button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
